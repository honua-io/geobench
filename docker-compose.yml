# GeoBench: Isolated benchmark harness.
#
# Each server gets its own dedicated PostGIS instance.
# The orchestrator (scripts/run-benchmark.sh) starts one server at a time
# using Docker Compose profiles, runs its benchmarks, then tears it down
# before starting the next — complete isolation between servers.
#
# Usage:
#   docker compose --profile honua up -d      # start Honua + its PostGIS + k6
#   docker compose --profile geoserver up -d   # start GeoServer + its PostGIS + k6
#   docker compose --profile qgis up -d        # start QGIS + its PostGIS + k6

volumes:
  pgdata-honua:
  pgdata-geoserver:
  pgdata-qgis:

services:
  # ─── PostGIS instances (one per server) ────────────────────────────

  postgis-honua:
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    profiles: ["honua"]
    ports:
      - "25432:5432"
    volumes:
      - pgdata-honua:/var/lib/postgresql/data
      - ./data/small/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_DB: geobench
      POSTGRES_USER: geobench
      POSTGRES_PASSWORD: geobench_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geobench -d geobench"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  postgis-geoserver:
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    profiles: ["geoserver"]
    volumes:
      - pgdata-geoserver:/var/lib/postgresql/data
      - ./data/small/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_DB: geobench
      POSTGRES_USER: geobench
      POSTGRES_PASSWORD: geobench_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geobench -d geobench"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  postgis-qgis:
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    profiles: ["qgis"]
    volumes:
      - pgdata-qgis:/var/lib/postgresql/data
      - ./data/small/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_DB: geobench
      POSTGRES_USER: geobench
      POSTGRES_PASSWORD: geobench_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geobench -d geobench"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  # ─── Feature servers (one at a time via profiles) ──────────────────

  honua:
    image: ${HONUA_IMAGE:-honuaio/honua-server:latest}
    profiles: ["honua"]
    ports:
      - "${HONUA_PORT:-8081}:8080"
    depends_on:
      postgis-honua:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgis-honua;Port=5432;Database=geobench;Username=geobench;Password=geobench_pass"
      HONUA_ADMIN_PASSWORD: "${HONUA_ADMIN_PASSWORD:-geobench-admin-key}"
      HONUA_DEV_AUTH: ""
      Security__ConnectionEncryption__MasterKey: "geobench-master-key-at-least-32-characters-long"
      Security__ConnectionEncryption__Salt: "Z2VvYmVuY2gtc2FsdC1mb3ItZW5jcnlwdGlvbi10ZXN0aW5n"
      HostValidation__RequireExplicitHosts: "false"
      AllowedHosts: "*"
      Limits__Query__MaxRecordCount: "10000"
      Limits__Query__DefaultRecordCount: "1000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz/live || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  geoserver:
    image: ${GEOSERVER_IMAGE:-docker.osgeo.org/geoserver:2.28.0}
    profiles: ["geoserver"]
    ports:
      - "${GEOSERVER_PORT:-8082}:8080"
    depends_on:
      postgis-geoserver:
        condition: service_healthy
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: "${GEOSERVER_ADMIN_PASSWORD:-geoserver}"
      GEOSERVER_CSRF_DISABLED: "true"
      INSTALL_EXTENSIONS: "true"
      STABLE_EXTENSIONS: "ogcapi-features"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/geoserver/web/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  qgis-server:
    image: ${QGIS_IMAGE:-qgis/qgis-server:3.38}
    profiles: ["qgis"]
    ports:
      - "${QGIS_PORT:-8083}:80"
    depends_on:
      postgis-qgis:
        condition: service_healthy
    volumes:
      - ./adapters/qgis/geobench.qgs:/etc/qgisserver/geobench.qgs:ro
    environment:
      QGIS_PROJECT_FILE: /etc/qgisserver/geobench.qgs
      QGIS_SERVER_LOG_LEVEL: "1"
      QGIS_SERVER_MAX_THREADS: "4"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:80/wfs3/collections' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  # ─── Load generator (shared, stateless) ────────────────────────────

  k6:
    image: ${K6_IMAGE:-grafana/k6:0.54.0}
    profiles: ["honua", "geoserver", "qgis"]
    volumes:
      - ./src/tests:/tests:ro
      - ./results:/results
    entrypoint: ["sleep", "infinity"]
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2g
